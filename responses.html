<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>母校マスコット生成会議🎨</title>
<style>
body{
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#4fd1c5,#7da0e6);
  color:#fff;
  max-width:900px;
  margin:0 auto;
  padding:20px;
}
h1{text-align:center;}
.panel{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
}
textarea,input,button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
  margin-top:8px;
}
textarea{
  min-height:90px;
  resize:vertical;
}
button{
  background:#ff7eb3;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
button:disabled{
  background:#ccc;
  cursor:not-allowed;
  opacity: 0.6;
}
#status{margin-top:10px;}
img{
  width:100%;
  border-radius:12px;
}
.thumbs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.thumb-item{position:relative;}
.thumb-item img{
  width:80px;
  height:80px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
}
.thumb-item img.active{
  border-color:white;
}
/* 通信中に履歴（サムネイルや削除ボタン）をクリックできなくするクラス */
.thumbs.disabled-ui .thumb-item img,
.thumbs.disabled-ui .delete-btn {
  cursor:not-allowed;
  pointer-events: none;
  opacity: 0.5;
}
.delete-btn{
  position:absolute;
  top:-5px;
  right:-5px;
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  color:white;
  padding:0;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🎨母校マスコット生成会議</h1>

<div class="panel">
<label>APIキー</label>
<input
  type="password"
  id="apiKey"
  placeholder="sk-..."
  oninput="sessionStorage.setItem('apiKey', this.value)"
>

<label>母校のイメージ</label>
<textarea id="userPrompt"></textarea>

<button id="generateBtn">新規生成</button>
</div>

<div class="panel">
<label>追加のイメージ</label>
<textarea id="editPrompt"></textarea>

<button id="editBtn" disabled>この画像を修正</button>
</div>

<div id="status">待機中</div>

<div class="panel">
<h2>生成結果</h2>
<div id="result">まだ画像はありません</div>
</div>

<div class="panel">
<h2>履歴（クリックで切替・×で削除）</h2>
<div id="historyThumbs" class="thumbs"></div>
</div>

<script>
const MAX_HISTORY = 10;

const BASE_PROMPT =
"高校のマスコットキャラクター。文字やロゴ（英語、日本語、アルファベット、数字）を一切含めない。看板、服の文字、背景の文字も禁止。純白の背景。背景色は白(#FFFFFF)。透明背景は禁止。キャラクター単体のみ。中央配置。";

const apiKeyEl = document.getElementById("apiKey");
const userPromptEl = document.getElementById("userPrompt");
const editPromptEl = document.getElementById("editPrompt");
const generateBtn = document.getElementById("generateBtn");
const editBtn = document.getElementById("editBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const historyEl = document.getElementById("historyThumbs");

let history = [];
let currentIndex = -1;
let originalImageCache = []; 

function setStatus(msg){
  statusEl.textContent = msg;
}

function currentItem(){
  return history[currentIndex] || null;
}

function showImage(dataUrl){
  resultEl.innerHTML = "";
  const img = document.createElement("img");
  img.src = dataUrl;
  resultEl.appendChild(img);
}

function saveSession(){
  try {
    sessionStorage.setItem("history", JSON.stringify(history));
    sessionStorage.setItem("currentIndex", currentIndex);
  } catch (e) {
    console.error("ストレージの保存に失敗しました:", e);
  }
}

function addToHistory(originalDataUrl, resizedImage, prompt){
  history.push({image: resizedImage, prompt});
  originalImageCache.push(originalDataUrl); // 1024pxのDataURLをメモリに保存

  if(history.length > MAX_HISTORY){
    history.shift();
    originalImageCache.shift();
  }

  currentIndex = history.length - 1;

  saveSession();
  renderHistory();
}

function renderHistory(){
  historyEl.innerHTML = "";

  history.forEach((item,index)=>{
    const wrapper = document.createElement("div");
    wrapper.className = "thumb-item";

    const img = document.createElement("img");
    img.src = item.image;

    if(index === currentIndex){
      img.classList.add("active");
    }

    img.onclick = ()=>{
      currentIndex = index;
      showImage(history[index].image);

      saveSession();
      renderHistory();

      if (originalImageCache[currentIndex]) {
        setStatus("履歴から選択（高解像度データ保持：いつでも綺麗に修正できます）");
      } else {
        setStatus("履歴から選択（※リロードされたため、この画像のみ 512px 画質での修正になります）");
      }
    };

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.textContent = "×";

    del.onclick = (e)=>{
      e.stopPropagation();

      history.splice(index,1);
      originalImageCache.splice(index,1);

      if(currentIndex >= history.length){
        currentIndex = history.length - 1;
      }

      saveSession();
      renderHistory();

      if(currentIndex >= 0){
        showImage(history[currentIndex].image);
      }else{
        resultEl.innerHTML = "まだ画像はありません";
        editBtn.disabled = true;
      }
    };

    wrapper.appendChild(img);
    wrapper.appendChild(del);
    historyEl.appendChild(wrapper);
  });
}

function base64ToDataUrl(b64){
  return "data:image/png;base64," + b64;
}

async function dataUrlToBlob(url){
  const r = await fetch(url);
  return await r.blob();
}

async function resizeImage(dataUrl, size = 512){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, size, size);
      resolve(canvas.toDataURL("image/png"));
    };
    img.src = dataUrl;
  });
}

function setUIRocking(isLock) {
  generateBtn.disabled = isLock;
  editBtn.disabled = isLock;
  
  if (isLock) {
    historyEl.classList.add("disabled-ui");
  } else {
    historyEl.classList.remove("disabled-ui");
    if(history.length > 0 && currentIndex >= 0) {
      editBtn.disabled = false;
    }
  }
}
  
async function generateImage(){
  const apiKey = apiKeyEl.value.trim();
  if(!apiKey){
    setStatus("APIキーを入力してください");
    return;
  }

  setUIRocking(true);

  try{
    setStatus("生成中...");

    const prompt = userPromptEl.value.trim();
    const fullPrompt = BASE_PROMPT + "。" + prompt;

    const res = await fetch(
      "https://api.openai.com/v1/images/generations",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer " + apiKey
        },
        body:JSON.stringify({
          model:"gpt-image-1", 
          prompt:fullPrompt,
          size:"1024x1024"
        })
      }
    );

    const data = await res.json();
    if(!res.ok){
      throw new Error(JSON.stringify(data));
    }

    // APIから返ってきたデータを判別して確実にBase64(DataURL)として取得する
    let originalDataUrl;
    if (data.data[0].b64_json) {
      originalDataUrl = base64ToDataUrl(data.data[0].b64_json);
    } else if (data.data[0].url) {
      // 万が一URLで返ってきた場合はそのまま指定（通常はb64_jsonで返る想定）
      originalDataUrl = data.data[0].url;
    }

    // 表示・ストレージ用に512pxにリサイズ
    const resizedImage = await resizeImage(originalDataUrl, 512);
    
    // 履歴とメモリに追加
    addToHistory(originalDataUrl, resizedImage, prompt);
    showImage(resizedImage);

    setStatus("生成完了");

  }catch(e){
    setStatus(e.message);
  }
  
  setUIRocking(false);
}

async function editImage(){
  const item = currentItem();
  if(!item){
    setStatus("先に生成してください");
    return;
  }

  setUIRocking(true);

  try{
    setStatus("修正中...");
    const apiKey = apiKeyEl.value.trim();
    const originalPrompt = item.prompt;
    const editText = editPromptEl.value.trim();

    const finalPrompt = `
${BASE_PROMPT}
元のキャラクター設定: ${originalPrompt}
今回の変更: ${editText}
現在の画像をベースに編集する。変更箇所以外はできるだけ維持する。`;

    let blob;
    // メモリキャッシュに1024pxデータがあればそれを使う
    if (originalImageCache[currentIndex]) {
      blob = await dataUrlToBlob(originalImageCache[currentIndex]);
    } else {
      blob = await dataUrlToBlob(item.image);
    }

    const form = new FormData();
    form.append("model","gpt-image-1");
    form.append("prompt",finalPrompt);
    form.append("image",blob,"image.png");

    const res = await fetch(
      "https://api.openai.com/v1/images/edits",
      {
        method:"POST",
        headers:{ "Authorization":"Bearer " + apiKey },
        body:form
      }
    );

    const data = await res.json();
    if(!res.ok){
      throw new Error(JSON.stringify(data));
    }

    // 修正結果のデータを取得
    let newOriginalDataUrl;
    if (data.data[0].b64_json) {
      newOriginalDataUrl = base64ToDataUrl(data.data[0].b64_json);
    } else if (data.data[0].url) {
      newOriginalDataUrl = data.data[0].url;
    }

    const resizedImage = await resizeImage(newOriginalDataUrl, 512);
    
    addToHistory(newOriginalDataUrl, resizedImage, originalPrompt);
    showImage(resizedImage);

    setStatus("修正完了");

  }catch(e){
    setStatus(e.message);
  }
  
  setUIRocking(false);
}

window.onload = ()=>{
  apiKeyEl.value = sessionStorage.getItem("apiKey") || "";
  const savedHistory = sessionStorage.getItem("history");
  const savedIndex = sessionStorage.getItem("currentIndex");

  if(savedHistory){
    history = JSON.parse(savedHistory);
  }
  if(savedIndex !== null){
    currentIndex = parseInt(savedIndex,10);
  }
  if(history.length > 0 && currentIndex >= 0){
    showImage(history[currentIndex].image);
    editBtn.disabled = false;
    originalImageCache = new Array(history.length).fill(null);
    setStatus("履歴を復元しました（※F5リロードを挟んだため、既存の履歴の修正は512px画質になります）");
  }
  renderHistory();
};

generateBtn.onclick = generateImage;
editBtn.onclick = editImage;
</script>
</body>
</html>
