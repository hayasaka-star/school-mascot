<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI 画像生成・再編集フォーム</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 30px auto;
      padding: 0 16px;
      line-height: 1.5;
    }
    h1, h2 {
      margin-bottom: 8px;
    }
    .panel {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }
    input, textarea, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-top: 6px;
      font-size: 14px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      margin-top: 16px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      white-space: pre-wrap;
      margin: 16px 0;
      padding: 12px;
      background: #f7f7f7;
      border-radius: 6px;
    }
    .image-area {
      margin-top: 12px;
    }
    .image-area img {
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      display: block;
      margin-top: 10px;
    }
    .small {
      color: #555;
      font-size: 13px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>OpenAI 画像生成・再編集フォーム</h1>
  <p class="small">
    初回プロンプトで画像を生成し、その後は追加プロンプトで同じ画像を修正できます。
  </p>

  <div class="panel">
    <h2>共通設定</h2>

    <label for="apiKey">OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />

    <div class="row">
      <div>
        <label for="size">画像サイズ</label>
        <select id="size">
          <option value="1024x1024">1024x1024</option>
          <option value="1536x1024">1536x1024</option>
          <option value="1024x1536">1024x1536</option>
          <option value="auto">auto</option>
        </select>
      </div>
      <div>
        <label for="quality">品質</label>
        <select id="quality">
          <option value="auto">auto</option>
          <option value="high">high</option>
          <option value="medium">medium</option>
          <option value="low">low</option>
        </select>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>1. 新規画像生成</h2>

    <label for="initialPrompt">初回プロンプト</label>
    <textarea id="initialPrompt" placeholder="例：夕焼けの奈良公園を歩く鹿、写実的、高精細"></textarea>

    <button id="generateBtn">新規生成</button>
  </div>

  <div class="panel">
    <h2>2. 生成済み画像の修正</h2>

    <label for="editPrompt">追加プロンプト（修正内容）</label>
    <textarea id="editPrompt" placeholder="例：空をもう少し赤くして、奥に五重塔を追加してください"></textarea>

    <button id="editBtn" disabled>この画像を修正</button>
    <p class="small">
      現在表示中の画像を編集対象として送信します。
    </p>
  </div>

  <div id="status">待機中</div>

  <div class="panel image-area">
    <h2>現在の画像</h2>
    <div id="result">まだ画像はありません。</div>
  </div>

  <script>
    const apiKeyEl = document.getElementById("apiKey");
    const sizeEl = document.getElementById("size");
    const qualityEl = document.getElementById("quality");
    const initialPromptEl = document.getElementById("initialPrompt");
    const editPromptEl = document.getElementById("editPrompt");
    const generateBtn = document.getElementById("generateBtn");
    const editBtn = document.getElementById("editBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    // 現在の画像を Data URL として保持
    let currentImageDataUrl = null;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function setBusy(isBusy) {
      generateBtn.disabled = isBusy;
      editBtn.disabled = isBusy || !currentImageDataUrl;
    }

    function showImage(dataUrl, altText = "generated image") {
      resultEl.innerHTML = "";
      const img = document.createElement("img");
      img.src = dataUrl;
      img.alt = altText;
      resultEl.appendChild(img);
    }

    function base64ToDataUrl(base64, mimeType = "image/png") {
      return `data:${mimeType};base64,${base64}`;
    }

    async function dataUrlToBlob(dataUrl) {
      const response = await fetch(dataUrl);
      return await response.blob();
    }

    async function generateImage() {
      const apiKey = apiKeyEl.value.trim();
      const prompt = initialPromptEl.value.trim();
      const size = sizeEl.value;
      const quality = qualityEl.value;

      if (!apiKey) {
        setStatus("APIキーを入力してください。");
        return;
      }
      if (!prompt) {
        setStatus("初回プロンプトを入力してください。");
        return;
      }

      setBusy(true);
      setStatus("画像を生成中です...");

      try {
        const response = await fetch("https://api.openai.com/v1/images/generations", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-image-1",
            prompt: prompt,
            size: size,
            quality: quality
          })
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus("生成エラー:\n" + JSON.stringify(data, null, 2));
          return;
        }

        const b64 = data?.data?.[0]?.b64_json;
        if (!b64) {
          setStatus("生成結果に画像データがありません。\n" + JSON.stringify(data, null, 2));
          return;
        }

        currentImageDataUrl = base64ToDataUrl(b64, "image/png");
        showImage(currentImageDataUrl, prompt);
        editBtn.disabled = false;

        setStatus("新規画像を生成しました。続けて修正できます。");
      } catch (error) {
        setStatus("通信エラー:\n" + error.message);
      } finally {
        setBusy(false);
      }
    }

    async function editImage() {
      const apiKey = apiKeyEl.value.trim();
      const prompt = editPromptEl.value.trim();
      const size = sizeEl.value;
      const quality = qualityEl.value;

      if (!apiKey) {
        setStatus("APIキーを入力してください。");
        return;
      }
      if (!currentImageDataUrl) {
        setStatus("先に画像を生成してください。");
        return;
      }
      if (!prompt) {
        setStatus("修正プロンプトを入力してください。");
        return;
      }

      setBusy(true);
      setStatus("画像を修正中です...");

      try {
        const imageBlob = await dataUrlToBlob(currentImageDataUrl);

        const formData = new FormData();
        formData.append("model", "gpt-image-1");
        formData.append("prompt", prompt);
        formData.append("size", size);
        formData.append("quality", quality);

        // 公式の images/edits は multipart/form-data で画像を送る
        formData.append("image", imageBlob, "current.png");

        const response = await fetch("https://api.openai.com/v1/images/edits", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${apiKey}`
          },
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus("編集エラー:\n" + JSON.stringify(data, null, 2));
          return;
        }

        const b64 = data?.data?.[0]?.b64_json;
        if (!b64) {
          setStatus("編集結果に画像データがありません。\n" + JSON.stringify(data, null, 2));
          return;
        }

        currentImageDataUrl = base64ToDataUrl(b64, "image/png");
        showImage(currentImageDataUrl, prompt);
        setStatus("画像を修正しました。さらに続けて修正できます。");
      } catch (error) {
        setStatus("通信エラー:\n" + error.message);
      } finally {
        setBusy(false);
      }
    }

    generateBtn.addEventListener("click", generateImage);
    editBtn.addEventListener("click", editImage);
  </script>
</body>
</html>
