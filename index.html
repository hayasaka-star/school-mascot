<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>母校マスコット生成会議🎨</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; }
    .panel { background: rgba(255,255,255,0.15); backdrop-filter: blur(12px); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    textarea, input { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-top: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 10px; background: #ff7eb3; color: white; font-weight: bold; cursor: pointer; }
    button:disabled { background: #999; cursor: not-allowed; }
    #undoBtn { background: #6c757d; display: none; }
    #status { margin: 10px 0; text-align: center; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
    #result img { width: 100%; border-radius: 12px; margin-top: 15px; }
  </style>
</head>
<body>
  <h1>🎨母校マスコット生成会議</h1>

  <div class="panel">
    <label>APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
    <label>母校のイメージ</label>
    <textarea id="userPrompt" rows="3" placeholder="例：京都、柴犬、かわいい"></textarea>
    <button id="generateBtn">✨ 新規生成</button>
  </div>

  <div class="panel">
    <label>修正指示</label>
    <textarea id="editPrompt" rows="2" placeholder="例：青い帽子をかぶせて"></textarea>
    <button id="editBtn" disabled>🪄 修正する</button>
    <button id="undoBtn">↩ 元に戻す</button>
  </div>

  <div id="status">待機中</div>
  <div class="panel" id="result">まだ画像はありません</div>

<script>
const apiKeyEl = document.getElementById("apiKey");
const userPromptEl = document.getElementById("userPrompt");
const editPromptEl = document.getElementById("editPrompt");
const generateBtn = document.getElementById("generateBtn");
const editBtn = document.getElementById("editBtn");
const undoBtn = document.getElementById("undoBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");

let imageHistory = [];
const MAX_HISTORY = 5;
const BASE_PROMPT = "School mascot character. ";

function setStatus(msg) { statusEl.textContent = msg; }

function updateUI() {
  resultEl.innerHTML = "";
  if (imageHistory.length > 0) {
    const img = document.createElement("img");
    img.src = imageHistory[imageHistory.length - 1];
    resultEl.appendChild(img);
    editBtn.disabled = false;
    undoBtn.style.display = imageHistory.length > 1 ? "block" : "none";
  } else {
    resultEl.textContent = "まだ画像はありません";
    editBtn.disabled = true;
    undoBtn.style.display = "none";
  }
}

async function dataUrlToBlob(dataUrl) {
  const res = await fetch(dataUrl);
  return await res.blob();
}

// 1. 新規生成
generateBtn.onclick = async () => {
  const apiKey = apiKeyEl.value.trim();
  if (!apiKey) return setStatus("APIキーを入れて！");
  
  setStatus("生成中...");
  try {
    const res = await fetch("https://api.openai.com/v1/images/generations", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: "dall-e-3", // 生成はDALL-E 3
        prompt: BASE_PROMPT + userPromptEl.value,
        response_format: "b64_json"
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error.message);

    imageHistory = ["data:image/png;base64," + data.data[0].b64_json];
    updateUI();
    setStatus("生成完了！");
  } catch (e) { setStatus("エラー: " + e.message); }
};

// 2. 修正 (ここがエラーの原因でした)
editBtn.onclick = async () => {
  const apiKey = apiKeyEl.value.trim();
  setStatus("修正中...");
  try {
    const blob = await dataUrlToBlob(imageHistory[imageHistory.length - 1]);
    const form = new FormData();
    // ★ここが大事！モデル名を指定する
    form.append("model", "dall-e-2"); 
    form.append("image", blob, "image.png");
    form.append("prompt", BASE_PROMPT + editPromptEl.value);
    form.append("response_format", "b64_json");

    const res = await fetch("https://api.openai.com/v1/images/edits", {
      method: "POST",
      headers: { "Authorization": `Bearer ${apiKey}` },
      body: form
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error.message);

    imageHistory.push("data:image/png;base64," + data.data[0].b64_json);
    if(imageHistory.length > MAX_HISTORY) imageHistory.shift();
    updateUI();
    setStatus("修正完了！");
  } catch (e) { setStatus("修正エラー: " + e.message); }
};

undoBtn.onclick = () => {
  imageHistory.pop();
  updateUI();
  setStatus("元に戻しました");
};
</script>
</body>
</html>
