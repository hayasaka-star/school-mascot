<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>母校マスコット生成会議🎨（分岐履歴対応）</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { text-align: center; }
    .panel {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 8px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #ff7eb3;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: scale(1.05); }
    #status { margin-top: 10px; }
    img { width: 100%; border-radius: 12px; margin-top: 10px; }

    .thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .thumbs img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .thumbs img.active {
      border: 2px solid #fff;
    }
  </style>
</head>
<body>
  <h1>🎨母校マスコット生成会議（分岐履歴）</h1>

  <div class="panel">
    <label>APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-..." />

    <label>母校のイメージ</label>
    <textarea id="userPrompt"></textarea>

    <button id="generateBtn">新規生成</button>
  </div>

  <div class="panel">
    <label>追加のイメージ</label>
    <textarea id="editPrompt"></textarea>

    <button id="editBtn" disabled>この画像を修正</button>
    <button id="undoBtn" disabled>1つ前に戻す</button>
  </div>

  <div id="status">待機中</div>

  <div class="panel">
    <h2>生成結果</h2>
    <div id="result">まだ画像はありません</div>
  </div>

  <div class="panel">
    <h2>履歴（分岐含む）</h2>
    <div id="historyThumbs" class="thumbs"></div>
  </div>

<script>
const MAX_HISTORY = 10;

const apiKeyEl = document.getElementById("apiKey");
const userPromptEl = document.getElementById("userPrompt");
const editPromptEl = document.getElementById("editPrompt");
const generateBtn = document.getElementById("generateBtn");
const editBtn = document.getElementById("editBtn");
const undoBtn = document.getElementById("undoBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const historyEl = document.getElementById("historyThumbs");

let currentImageDataUrl = null;
let imageHistory = []; // 全履歴（削除しない）
let currentIndex = -1; // 今どこ見てるか

const BASE_PROMPT = "高校のマスコットキャラクター";

function setStatus(msg){ statusEl.textContent = msg; }

function showImage(dataUrl){
  resultEl.innerHTML = "";
  const img = document.createElement("img");
  img.src = dataUrl;
  resultEl.appendChild(img);
}

function renderHistory(){
  historyEl.innerHTML = "";

  imageHistory.forEach((imgUrl, index) => {
    const img = document.createElement("img");
    img.src = imgUrl;

    if(index === currentIndex){
      img.classList.add("active");
    }

    img.onclick = () => {
      currentIndex = index;
      currentImageDataUrl = imageHistory[currentIndex];
      showImage(currentImageDataUrl);
      setStatus("履歴から選択");
      renderHistory();
    };

    historyEl.appendChild(img);
  });

  undoBtn.disabled = currentIndex <= 0;
}

function addToHistory(dataUrl){
  imageHistory.push(dataUrl);
  currentIndex = imageHistory.length - 1;

  if(imageHistory.length > MAX_HISTORY){
    imageHistory.shift();
    currentIndex--;
  }

  renderHistory();
}

function base64ToDataUrl(b64){ return `data:image/png;base64,${b64}`; }

async function dataUrlToBlob(dataUrl){
  const res = await fetch(dataUrl);
  return await res.blob();
}

async function generateImage(){
  const apiKey = apiKeyEl.value.trim();
  if(!apiKey){ setStatus("APIキー入れて"); return; }

  const fullPrompt = BASE_PROMPT + "。" + userPromptEl.value;
  setStatus("生成中...");

  const res = await fetch("https://api.openai.com/v1/images/generations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model:"gpt-image-1",
      prompt: fullPrompt,
      size:"1024x1024"
    })
  });

  const data = await res.json();
  if(!res.ok){ setStatus(JSON.stringify(data)); return; }

  const b64 = data.data[0].b64_json;
  currentImageDataUrl = base64ToDataUrl(b64);

  imageHistory = [];
  addToHistory(currentImageDataUrl);

  showImage(currentImageDataUrl);
  editBtn.disabled = false;
  setStatus("生成完了！");
}

async function editImage(promptText){
  const apiKey = apiKeyEl.value.trim();
  if(!currentImageDataUrl){ setStatus("先に生成して"); return; }

  const finalPrompt = BASE_PROMPT + "。" + promptText;
  setStatus("修正中...");

  const blob = await dataUrlToBlob(currentImageDataUrl);

  const form = new FormData();
  form.append("model","gpt-image-1");
  form.append("prompt", finalPrompt);
  form.append("image", blob, "img.png");

  const res = await fetch("https://api.openai.com/v1/images/edits",{
    method:"POST",
    headers:{ "Authorization":`Bearer ${apiKey}` },
    body: form
  });

  const data = await res.json();
  if(!res.ok){ setStatus(JSON.stringify(data)); return; }

  const b64 = data.data[0].b64_json;
  currentImageDataUrl = base64ToDataUrl(b64);

  addToHistory(currentImageDataUrl);
  showImage(currentImageDataUrl);

  setStatus("修正完了！（分岐保存）");
}

undoBtn.onclick = () => {
  if(currentIndex <= 0){
    setStatus("これ以上戻れない");
    return;
  }

  currentIndex--;
  currentImageDataUrl = imageHistory[currentIndex];

  showImage(currentImageDataUrl);
  renderHistory();

  setStatus("1つ前に戻した（分岐保持）");
};

generateBtn.onclick = generateImage;
editBtn.onclick = () => editImage(editPromptEl.value);
</script>
</body>
</html>
