<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マスコットメーカー🎨（完成版）</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { text-align: center; }
    .panel {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    textarea, input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 8px;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #ff7eb3;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: scale(1.05); }
    .quick-buttons button {
      width: auto;
      margin-right: 8px;
      margin-top: 8px;
      padding: 8px 12px;
    }
    #status { margin-top: 10px; }
    img { width: 100%; border-radius: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>🎨 マスコットメーカー</h1>

  <div class="panel">
    <label>APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-..." />

    <label>母校のイメージ</label>
    <textarea id="userPrompt" placeholder="例：スポーツ得意、文武両道、歴史がある"></textarea>

    <button id="generateBtn">新規生成</button>
  </div>

  <div class="panel">
    <label>自由修正</label>
    <textarea id="editPrompt" placeholder="例：もう少し目を大きくして"></textarea>

    <button id="editBtn" disabled>この画像を修正</button>
  </div>

  <div class="panel">
    <label>プロンプト履歴</label>
    <select id="history"></select>
    <button onclick="reusePrompt()">このプロンプトを使う</button>
  </div>

  <div id="status">待機中</div>

  <div class="panel">
    <h2>生成結果</h2>
    <div id="result">まだ画像はありません</div>
  </div>

<script>
const apiKeyEl = document.getElementById("apiKey");
const userPromptEl = document.getElementById("userPrompt");
const editPromptEl = document.getElementById("editPrompt");
const generateBtn = document.getElementById("generateBtn");
const editBtn = document.getElementById("editBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const historyEl = document.getElementById("history");

let currentImageDataUrl = null;
let promptHistory = [];

const BASE_PROMPT = "高校のマスコットキャラクター、ゆるキャラ風、かわいい、ポップ、SNS映え";

function setStatus(msg){ statusEl.textContent = msg; }

function showImage(dataUrl){
  resultEl.innerHTML = "";
  const img = document.createElement("img");
  img.src = dataUrl;
  resultEl.appendChild(img);
}

function base64ToDataUrl(b64){ return `data:image/png;base64,${b64}`; }

async function dataUrlToBlob(dataUrl){
  const res = await fetch(dataUrl);
  return await res.blob();
}

function addHistory(prompt){
  promptHistory.push(prompt);
  const option = document.createElement("option");
  option.text = prompt;
  historyEl.add(option);
}

function reusePrompt(){
  userPromptEl.value = historyEl.value;
}

async function generateImage(){
  const apiKey = apiKeyEl.value.trim();
  if(!apiKey){ setStatus("APIキー入れて"); return; }

  const fullPrompt = BASE_PROMPT + "。" + userPromptEl.value;
  addHistory(fullPrompt);

  setStatus("生成中...");

  const res = await fetch("https://api.openai.com/v1/images/generations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model:"gpt-image-1",
      prompt: fullPrompt,
      size:"1024x1024"
    })
  });

  const data = await res.json();
  if(!res.ok){ setStatus(JSON.stringify(data)); return; }

  const b64 = data.data[0].b64_json;
  currentImageDataUrl = base64ToDataUrl(b64);
  showImage(currentImageDataUrl);

  editBtn.disabled = false;
  setStatus("生成完了！");
}

async function editImage(promptText){
  const apiKey = apiKeyEl.value.trim();
  if(!currentImageDataUrl){ setStatus("先に生成して"); return; }

  const finalPrompt = BASE_PROMPT + "。" + promptText;
  addHistory(finalPrompt);

  setStatus("修正中...");

  const blob = await dataUrlToBlob(currentImageDataUrl);

  const form = new FormData();
  form.append("model","gpt-image-1");
  form.append("prompt", finalPrompt);
  form.append("image", blob, "img.png");

  const res = await fetch("https://api.openai.com/v1/images/edits",{
    method:"POST",
    headers:{ "Authorization":`Bearer ${apiKey}` },
    body: form
  });

  const data = await res.json();
  if(!res.ok){ setStatus(JSON.stringify(data)); return; }

  const b64 = data.data[0].b64_json;
  currentImageDataUrl = base64ToDataUrl(b64);
  showImage(currentImageDataUrl);

  setStatus("修正完了！");
}

function quickEdit(text){
  editImage(text);
}

generateBtn.onclick = generateImage;
editBtn.onclick = () => editImage(editPromptEl.value);
</script>
</body>
</html>
