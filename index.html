<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>母校マスコット生成会議🎨</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #a8e6cf, #dcedc1);
      color: #fff;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 { text-align: center; }
    .panel {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    textarea, input, button {
      width: 100%;
      padding: 12px;          /* ←統一 */
      border-radius: 8px;
      border: none;
      margin-top: 8px;
      box-sizing: border-box; /* ←これも重要 */
    }
    button {
      margin-top: 10px;
      border-radius: 10px;
      background: #ff7eb3;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: scale(1.05); }
    #status { margin-top: 10px; }
    img { width: 100%; border-radius: 12px; margin-top: 10px; }

    .thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .thumb-item {
      position: relative;
    }
    .thumb-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .thumb-item img.active {
      border: 2px solid #fff;
    }
    .delete-btn {
      position: absolute;
      top: -5px;
      right: -5px;
      background: red;
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🎨母校マスコット生成会議</h1>

  <div class="panel">
    <label>APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-..." />

    <label>母校のイメージ</label>
    <textarea id="userPrompt"></textarea>

    <button id="generateBtn">新規生成</button>
  </div>

  <div class="panel">
    <label>追加のイメージ</label>
    <textarea id="editPrompt"></textarea>

    <button id="editBtn" disabled>この画像を修正</button>
  </div>

  <div id="status">待機中</div>

  <div class="panel">
    <h2>生成結果</h2>
    <div id="result">まだ画像はありません</div>
  </div>

  <div class="panel">
    <h2>履歴（クリックで切替・×で削除）</h2>
    <div id="historyThumbs" class="thumbs"></div>
  </div>

<script>
const MAX_HISTORY = 20;

const apiKeyEl = document.getElementById("apiKey");
const userPromptEl = document.getElementById("userPrompt");
const editPromptEl = document.getElementById("editPrompt");
const generateBtn = document.getElementById("generateBtn");
const editBtn = document.getElementById("editBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const historyEl = document.getElementById("historyThumbs");

let currentImageDataUrl = null;
let imageHistory = [];
let currentIndex = -1;

const BASE_PROMPT = "高校のマスコットキャラクター";

function setStatus(msg){ statusEl.textContent = msg; }

function showImage(dataUrl){
  resultEl.innerHTML = "";
  const img = document.createElement("img");
  img.src = dataUrl;
  resultEl.appendChild(img);
}

function renderHistory(){
  historyEl.innerHTML = "";

  imageHistory.forEach((imgUrl, index) => {
    const wrapper = document.createElement("div");
    wrapper.className = "thumb-item";

    const img = document.createElement("img");
    img.src = imgUrl;

    if(index === currentIndex){
      img.classList.add("active");
    }

    img.onclick = () => {
      currentIndex = index;
      currentImageDataUrl = imageHistory[currentIndex];
      showImage(currentImageDataUrl);
      setStatus("履歴から選択");
      renderHistory();
    };

    const delBtn = document.createElement("button");
    delBtn.textContent = "×";
    delBtn.className = "delete-btn";

    delBtn.onclick = (e) => {
      e.stopPropagation();

      imageHistory.splice(index, 1);

      if(currentIndex >= index){
        currentIndex--;
      }

      if(currentIndex < 0 && imageHistory.length > 0){
        currentIndex = 0;
      }

      currentImageDataUrl = imageHistory[currentIndex] || null;

      if(currentImageDataUrl){
        showImage(currentImageDataUrl);
      } else {
        resultEl.innerHTML = "まだ画像はありません";
      }

      renderHistory();
      setStatus("履歴を削除");
    };

    wrapper.appendChild(img);
    wrapper.appendChild(delBtn);
    historyEl.appendChild(wrapper);
  });

}

function addToHistory(dataUrl){
  imageHistory.push(dataUrl);
  currentIndex = imageHistory.length - 1;

  if(imageHistory.length > MAX_HISTORY){
    imageHistory.shift();
    currentIndex--;
  }

  renderHistory();
}

function base64ToDataUrl(b64){ return `data:image/png;base64,${b64}`; }

async function dataUrlToBlob(dataUrl){
  const res = await fetch(dataUrl);
  return await res.blob();
}

async function generateImage(){
  const apiKey = apiKeyEl.value.trim();
  if(!apiKey){ setStatus("APIキー入れて"); return; }

  const fullPrompt = BASE_PROMPT + "。" + userPromptEl.value;
  setStatus("生成中...");

  const res = await fetch("https://api.openai.com/v1/images/generations",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model:"gpt-image-1",
      prompt: fullPrompt,
      size:"1024x1024"
    })
  });

  const data = await res.json();
  if(!res.ok){ setStatus(JSON.stringify(data)); return; }

  const b64 = data.data[0].b64_json;
  currentImageDataUrl = base64ToDataUrl(b64);

  imageHistory = [];
  addToHistory(currentImageDataUrl);

  showImage(currentImageDataUrl);
  editBtn.disabled = false;
  setStatus("生成完了！");
}

async function editImage(promptText){
  const apiKey = apiKeyEl.value.trim();
  if(!currentImageDataUrl){ setStatus("先に生成して"); return; }

  const finalPrompt = BASE_PROMPT + "。" + promptText;
  setStatus("修正中...");

  const blob = await dataUrlToBlob(currentImageDataUrl);

  const form = new FormData();
  form.append("model","gpt-image-1");
  form.append("prompt", finalPrompt);
  form.append("image", blob, "img.png");

  const res = await fetch("https://api.openai.com/v1/images/edits",{
    method:"POST",
    headers:{ "Authorization":`Bearer ${apiKey}` },
    body: form
  });

  const data = await res.json();
  if(!res.ok){ setStatus(JSON.stringify(data)); return; }

  const b64 = data.data[0].b64_json;
  currentImageDataUrl = base64ToDataUrl(b64);

  addToHistory(currentImageDataUrl);
  showImage(currentImageDataUrl);

  setStatus("修正完了！（分岐保存）");
}


generateBtn.onclick = generateImage;
editBtn.onclick = () => editImage(editPromptEl.value);
</script>
</body>
</html>
