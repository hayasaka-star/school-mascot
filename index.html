<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マスコットメーカー🎨</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .panel {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    textarea, input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 8px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      background: #ff7eb3;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff5c9c;
    }

    button:disabled {
      opacity: 0.5;
    }

    #status {
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 13px;
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🎨 マスコットメーカー</h1>

  <div class="panel">
    <label>APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-..." />

    <label>キャラのイメージ（任意）</label>
    <textarea id="userPrompt" placeholder="例：元気な、スポーツが得意、青色ベース"></textarea>

    <button id="generateBtn">マスコット生成！</button>
  </div>

  <div id="status">待機中</div>

  <div class="panel">
    <h2>生成結果</h2>
    <div id="result">まだ画像はありません</div>
  </div>

<script>
const apiKeyEl = document.getElementById("apiKey");
const userPromptEl = document.getElementById("userPrompt");
const generateBtn = document.getElementById("generateBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");

// ★ マスコット固定プロンプト
const BASE_PROMPT = "高校のマスコットキャラクター、ゆるキャラ風、かわいい、ポップ、SNS映え、シンプルで親しみやすいデザイン";

function setStatus(msg) {
  statusEl.textContent = msg;
}

function showImage(dataUrl) {
  resultEl.innerHTML = "";
  const img = document.createElement("img");
  img.src = dataUrl;
  resultEl.appendChild(img);
}

function base64ToDataUrl(base64) {
  return `data:image/png;base64,${base64}`;
}

async function generateImage() {
  const apiKey = apiKeyEl.value.trim();
  const userPrompt = userPromptEl.value.trim();

  if (!apiKey) {
    setStatus("APIキーを入力して！");
    return;
  }

  setStatus("生成中...ちょっと待ってね");

  try {
    const response = await fetch("https://api.openai.com/v1/images/generations", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "gpt-image-1",
        prompt: BASE_PROMPT + "。" + userPrompt,
        size: "1024x1024"
      })
    });

    const data = await response.json();

    if (!response.ok) {
      setStatus("エラー: " + JSON.stringify(data));
      return;
    }

    const b64 = data.data[0].b64_json;
    const imgUrl = base64ToDataUrl(b64);

    showImage(imgUrl);
    setStatus("完成！✨ もう一回作るのもOK！");

  } catch (e) {
    setStatus("通信エラー: " + e.message);
  }
}

generateBtn.addEventListener("click", generateImage);
</script>
</body>
</html>
